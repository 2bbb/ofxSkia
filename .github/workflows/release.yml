name: Release

on:
  push:
    tags: ['v*']
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download prebuilt libs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download prebuilt-libs \
            --repo ${{ github.repository }} \
            --pattern "ofxSkia-prebuilt-libs-macos.zip" \
            --dir /tmp/skia-libs
          unzip -q /tmp/skia-libs/ofxSkia-prebuilt-libs-macos.zip -d .

      - name: Create zip
        run: |
          cd ..
          zip -r ofxSkia.zip ofxSkia \
            --exclude "ofxSkia/.git/*" \
            --exclude "ofxSkia/testApp/bin/*" \
            --exclude "ofxSkia/testApp/obj/*" \
            --exclude "ofxSkia/testApp/*.xcodeproj/*"
          mv ofxSkia.zip ofxSkia/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: ofxSkia.zip
