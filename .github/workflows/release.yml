name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create zip
        run: |
          cd ..
          zip -r ofxSkia.zip ofxSkia \
            --exclude "ofxSkia/.git/*" \
            --exclude "ofxSkia/testApp/bin/*" \
            --exclude "ofxSkia/testApp/obj/*" \
            --exclude "ofxSkia/testApp/*.xcodeproj/*"
          mv ofxSkia.zip ofxSkia/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: ofxSkia.zip
