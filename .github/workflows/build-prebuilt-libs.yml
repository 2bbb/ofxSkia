name: Build Prebuilt Libs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install ninja
        run: brew install ninja

      - name: Fetch depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git /tmp/depot_tools
          echo "/tmp/depot_tools" >> $GITHUB_PATH

      - name: Fetch Skia
        run: bash scripts/fetch_skia.sh

      - name: Build Skia (arm64 + x64 universal)
        run: bash scripts/build_skia_macos.sh

      - name: Package
        run: zip -r ofxSkia-prebuilt-libs-macos.zip libs/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: prebuilt-libs
          name: Prebuilt Libraries
          prerelease: true
          files: ofxSkia-prebuilt-libs-macos.zip

  build-linux64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build python3 git curl rsync \
            libfontconfig1-dev libfreetype6-dev

      - name: Fetch depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git /tmp/depot_tools
          echo "/tmp/depot_tools" >> $GITHUB_PATH

      - name: Fetch Skia
        run: bash scripts/fetch_skia.sh

      - name: Build Skia (linux64)
        run: bash scripts/build_skia_linux.sh

      - name: Package
        run: zip -r ofxSkia-prebuilt-libs-linux64.zip libs/skia/lib/linux64/ libs/skia/include/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: prebuilt-libs
          name: Prebuilt Libraries
          prerelease: true
          files: ofxSkia-prebuilt-libs-linux64.zip

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Fetch depot_tools
        shell: pwsh
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git C:\depot_tools
          echo "C:\depot_tools" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
          echo "DEPOT_TOOLS_WIN_TOOLCHAIN=0" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      - name: Fetch Skia
        shell: pwsh
        run: .\scripts\fetch_skia_windows.ps1

      - name: Build Skia Release (win x64)
        shell: pwsh
        run: .\scripts\build_skia_windows.ps1

      - name: Clean Release build intermediates
        shell: pwsh
        run: Remove-Item -Recurse -Force C:\skia\skia\out\vs -ErrorAction SilentlyContinue

      - name: Build Skia Debug (win x64)
        shell: pwsh
        run: .\scripts\build_skia_windows.ps1 -Debug

      - name: Clean Debug build intermediates
        shell: pwsh
        run: Remove-Item -Recurse -Force C:\skia\skia\out\vs_debug -ErrorAction SilentlyContinue

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path libs\skia -DestinationPath ofxSkia-prebuilt-libs-windows.zip

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: prebuilt-libs
          name: Prebuilt Libraries
          prerelease: true
          files: ofxSkia-prebuilt-libs-windows.zip
